<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #09090b;
            --bg-surface: rgba(24, 24, 27, 0.65);
            --bg-card: #202024;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #6366f1; 
            --accent-glow: rgba(99, 102, 241, 0.25);
            --accent-border: rgba(99, 102, 241, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 1.5rem;
        }

        
        .bg-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -150px;
            right: -100px;
            z-index: 1;
            filter: blur(50px);
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -200px;
            left: -150px;
            z-index: 1;
            filter: blur(60px);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: var(--transition-smooth);
        }

        .login-card:hover {
            border-color: var(--accent-border);
            box-shadow: 0 25px 55px -12px var(--accent-glow);
        }

        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .portal-tag {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .portal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 65%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .portal-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .form-input {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input:focus ~ .input-icon {
            color: var(--accent);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-top: -0.25rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--accent);
        }

        .forgot-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .forgot-link:hover {
            filter: brightness(1.2);
            text-decoration: underline;
        }

        
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
            border: none;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px var(--accent-glow);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        
        .card-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .signup-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .signup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-card">
        
        <header class="login-header">
            <span class="portal-tag">HIT Education</span>
            <h1 class="portal-title">Student Portal</h1>
            <p class="portal-desc">Sign in to access your dashboard</p>
        </header>

        
        <form class="login-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" required placeholder="name@hit.edu.in" class="form-input">
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" required placeholder="••••••••" class="form-input">
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        
        <footer class="card-footer">
            Don't have an account? <a href="#" class="signup-link">Register Now</a>
        </footer>
    </div>
</body>

</html>
